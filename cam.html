<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ön Kamera → Telegram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #0f0;
            text-align: center;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        video {
            width: 100%;
            max-width: 380px;
            border-radius: 12px;
            margin: 15px 0;
            background: #000;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        button:hover { background: #006699; }
        #status {
            margin-top: 20px;
            font-size: 17px;
            min-height: 60px;
        }
        .success { color: #0f0; }
        .error { color: #f44; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Ön Kamera → Telegram</h1>
        <p>Butona bas → Ön kamera açılsın, fotoğraf çekilsin ve botuna gönderilsin.</p>
        
        <video id="video" autoplay playsinline></video>
        
        <button onclick="takeAndSendPhoto()">📷 FOTOĞRAF ÇEK VE GÖNDER</button>
        
        <div id="status">Kamera başlatılıyor...</div>
    </div>

    <script>
        // === SENİN BİLGİLERİN ===
        const BOT_TOKEN = "8604225952:AAHoULyCnrkSQ1Pqjo3xa6UlZgwo7H5ObRA";
        const CHAT_ID = "1636656252";

        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');

        let stream = null;

        // Kamerayı başlat (ön kamera)
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },   // "user" = ön kamera
                    audio: false
                });
                video.srcObject = stream;
                statusEl.textContent = "Ön kamera hazır. Butona basabilirsiniz.";
            } catch (err) {
                statusEl.className = "error";
                statusEl.textContent = "Kamera açılamadı: " + err.message;
                console.error(err);
            }
        }

        async function takeAndSendPhoto() {
            if (!stream) {
                statusEl.textContent = "Kamera henüz hazır değil...";
                return;
            }

            statusEl.textContent = "Fotoğraf çekiliyor...";
            statusEl.className = "";

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const base64Image = canvas.toDataURL('image/jpeg', 0.85);

                statusEl.textContent = "Telegram'a gönderiliyor...";

                const byteString = atob(base64Image.split(',')[1]);
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) {
                    ia[i] = byteString.charCodeAt(i);
                }
                const blob = new Blob([ab], { type: 'image/jpeg' });

                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'on_kamera_' + Date.now() + '.jpg');
                formData.append('caption', `📸 Ön Kamera Fotoğrafı\nTarih: ${new Date().toLocaleString('tr-TR')}`);

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.ok) {
                    statusEl.className = "success";
                    statusEl.textContent = "✅ Fotoğraf başarıyla gönderildi!";
                } else {
                    statusEl.className = "error";
                    statusEl.textContent = "❌ Gönderme hatası: " + (result.description || "Bilinmiyor");
                }
            } catch (err) {
                statusEl.className = "error";
                statusEl.textContent = "❌ Hata: " + err.message;
                console.error(err);
            }
        }

        // Sayfa yüklendiğinde kamerayı otomatik başlat
        window.onload = startCamera;

        // Sayfa kapatılırken kamerayı durdur
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
        };
    </script>
</body>
          </html>
